<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or 'Personality Test Portal' }}</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --primary: #1f4e79;
      --secondary: #2f80ed;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe3ef;
      --success: #e8f7ee;
      --danger: #fdecec;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .container {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 16px 40px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(31, 78, 121, 0.08);
      margin-bottom: 18px;
    }
    h1, h2, h3 { margin-top: 0; }
    .hero {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      padding: 26px;
      border-radius: 22px;
      margin-bottom: 20px;
    }
    .grid {
      display: grid;
      gap: 16px;
    }
    .grid-2 { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    label {
      font-size: 14px;
      font-weight: 700;
      display: block;
      margin-bottom: 8px;
    }
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
    }
    .question-title {
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .option {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      background: #fbfdff;
    }
    .option input { margin-right: 10px; }
    .btn {
      display: inline-block;
      border: none;
      background: var(--primary);
      color: white;
      padding: 12px 18px;
      border-radius: 12px;
      text-decoration: none;
      cursor: pointer;
      font-weight: 700;
    }
    .btn.secondary { background: #374151; }
    .flash.error {
      background: var(--danger);
      border: 1px solid #f7c1c1;
      color: #9b1c1c;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 16px;
    }
    .pill {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: #eef4ff;
      color: var(--primary);
      font-weight: 700;
      margin-right: 8px;
      margin-bottom: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      border-bottom: 1px solid var(--border);
      padding: 10px 8px;
      text-align: left;
      vertical-align: top;
    }
    th { background: #f8fbff; position: sticky; top: 0; }
    .table-wrap { overflow: auto; }
    .muted { color: var(--muted); }
  </style>
</head>
<body>
  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
